<div class="container">

  <div class="header">
    <h2>Project</h2>
    <button class="btn-primary" (click)="openModal()">+ Tambah Project</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>No</th>
        <th>Title</th>
        <th>Description</th>
        <th>Tech Stack</th>
        <th>Image</th>
        <th>Link</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let project of projects; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ project.title }}</td>
        <td>{{ project.description }}</td>
        <td>{{ project.technologies }}</td>

        <td>
          <img *ngIf="project.image"
               [src]="'http://127.0.0.1:8000/storage/' + project.image"
               width="40">
        </td>

        <td>
          <a [href]="formatLink(project.live_link)" target="_blank">Link</a>
        </td>

        <td class="action-cell">
        <div class="dropdown">
          <button class="dots-btn" (click)="toggleMenu(i, $event)">⋮</button>

          <div class="dropdown-menu" *ngIf="activeMenu === i">
            <div class="dropdown-item" (click)="edit(project); closeMenuOutside();">Edit</div>
            <div class="dropdown-item delete" (click)="delete(project); closeMenuOutside();">Delete</div>
          </div>
        </div>
      </td>
      </tr>
    </tbody>
  </table>

</div>

<!-- MODAL PROJECT -->
<div class="modal" *ngIf="showModal">
    <div class="modal-content">
        <h3>Tambah Project</h3>
        <form (ngSubmit)="save()">
            <div class="form-group">
                <label for="name">Title:</label>
                <input type="text" name="title" [(ngModel)]="newProject.title" class="form-control">
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <input type="text" name="description" [(ngModel)]="newProject.description" class="form-control">
            </div>
            <div class="form-group">
                <label for="technologies">Techstack:</label>
                <input type="text" name="technologies" [(ngModel)]="newProject.technologies" class="form-control">
            </div>
            <div class="form-group">
                <label for="image">Image:</label>
                <input type="file" name="image" (change)="onFileSelected($event)" class="form-control">
            </div>
            <div class="form-group">
                <label for="live_link">Live Link:</label>
                <input type="text" name="live_link" [(ngModel)]="newProject.live_link" class="form-control">
            </div>
            <img *ngIf="previewUrl !== null" [src]="previewUrl" width="100" class="preview-image">
            <button type="submit" class="btn-primary">Simpan</button>
            <button type="button" class="btn-secondary" (click)="closeModal()">Batal</button>
        </form>
    </div>
</div>
