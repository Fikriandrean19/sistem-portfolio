<div class="container">

    <div class="header">
        <h2>Skill</h2>
        <button class="btn-primary" (click)="openModal()">+ Tambah Skill</button>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>No</th>
                <th>Name</th>
                <th>Level</th>
                <th>Icon</th>
                <th>action</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let skill of skills; let i = index">
                <td>{{ i + 1 }}</td>
                <td>{{ skill.name }}</td>
                <td>{{ skill.level }}</td>
                <!-- <td><img [src]="'http://127.0.0.1:8000/storage/' + skill.image" width="40"></td> -->
                 <td><img [src]="skill.image" width="40"></td>
                <td>
                    <button class="btn-edit" (click)="edit(skill)">Edit</button>
                    <button class="btn-delete " (click)="delete(skill)">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Add Skill Modal -->
<div class="modal" *ngIf="showModal">
    <div class="modal-content">
        <h3>Tambah Skill</h3>
        <form (ngSubmit)="save()">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" name="name" [(ngModel)]="newSkill.name" class="form-control">
            </div>
            <div class="form-group">
                <label for="level">Level:</label>
                <input type="text" name="level" [(ngModel)]="newSkill.level" class="form-control">
            </div>
            <div class="form-group">
                <label for="image">Image:</label>
                <input type="file" name="image" (change)="onFileSelected($event)" (input)="onFileSelected($event)" class="form-control">
            </div>
            <img *ngIf="previewUrl !== null" [src]="previewUrl" width="100" class="preview-image">
            <button type="submit" class="btn-primary">Simpan</button>
            <button type="button" class="btn-secondary" (click)="closeModal()">Batal</button>
        </form>
    </div>
</div>
